# fullsend-stage: prioritize
name: Prioritize

on:
  workflow_dispatch:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string

concurrency:
  group: fullsend-prioritize-${{ inputs.source_repo }}-${{ fromJSON(inputs.event_payload).issue.number }}
  cancel-in-progress: true

jobs:
  prioritize:
    name: Prioritize
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout .fullsend repository
        uses: actions/checkout@v6

      - name: Checkout upstream defaults
        uses: actions/checkout@v6
        with:
          repository: fullsend-ai/fullsend
          ref: v0
          path: .defaults
          sparse-checkout: |
            internal/scaffold/fullsend-repo/agents/
            internal/scaffold/fullsend-repo/skills/
            internal/scaffold/fullsend-repo/schemas/
            internal/scaffold/fullsend-repo/harness/
            internal/scaffold/fullsend-repo/policies/
            internal/scaffold/fullsend-repo/scripts/
            .github/scripts/

      - name: Prepare workspace (upstream defaults + org overrides)
        run: |
          set -euo pipefail
          for dir in agents skills schemas harness policies scripts; do
            src=".defaults/internal/scaffold/fullsend-repo/${dir}"
            if [[ -d "${src}" ]]; then
              mkdir -p "${dir}"
              cp -r "${src}/." "${dir}/"
            fi
          done
          if [[ -d ".defaults/.github/scripts" ]]; then
            mkdir -p .github/scripts
            cp -r ".defaults/.github/scripts/." .github/scripts/
          fi
          for dir in agents skills schemas harness policies scripts; do
            if [[ -d "customized/${dir}" ]]; then
              find "customized/${dir}" -type f ! -name '.gitkeep' -print0 \
                | while IFS= read -r -d '' f; do
                    rel="${f#customized/}"
                    mkdir -p "$(dirname "${rel}")"
                    cp "${f}" "${rel}"
                  done
            fi
          done
          rm -rf .defaults

      - name: Validate enrollment and extract repo metadata
        id: repo-parts
        uses: fullsend-ai/fullsend/.github/actions/validate-enrollment@v0
        with:
          source_repo: ${{ inputs.source_repo }}

      - name: Mint prioritize token
        id: app-token
        uses: fullsend-ai/fullsend/.github/actions/mint-token@v0
        with:
          role: prioritize
          repos: ${{ steps.repo-parts.outputs.name }}
          mint_url: ${{ vars.FULLSEND_MINT_URL }}

      - name: Setup GCP and prepare credentials
        uses: fullsend-ai/fullsend/.github/actions/setup-gcp@v0
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: PRIORITIZE_
          PRIORITIZE_GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PRIORITIZE_ORG: ${{ github.repository_owner }}
          PRIORITIZE_PROJECT_NUMBER: ${{ vars.FULLSEND_PROJECT_NUMBER }}
          PRIORITIZE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          PRIORITIZE_CLOUD_ML_REGION: ${{ vars.FULLSEND_GCP_REGION }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Create empty target-repo directory
        run: mkdir -p target-repo

      - name: Run prioritize agent
        uses: fullsend-ai/fullsend@v0
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
        with:
          agent: prioritize
